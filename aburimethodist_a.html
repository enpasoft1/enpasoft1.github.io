<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SMS · EpitechGh</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Favicon: red square with white A and blue border -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23C8102E'/%3E%3Crect x='2' y='2' width='28' height='28' rx='6' fill='none' stroke='%230033A0' stroke-width='2'/%3E%3Ctext x='16' y='23' font-family='system-ui,sans-serif' font-size='18' font-weight='800' fill='%23FFFFFF' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E">

  <style>
    /* ----- reset & base ----- */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a1628;
    }

    /* ----- loading overlay — powerful, dynamic, rich ----- */
    #loader {
      position: fixed;
      inset: 0;
      background: #0a1628;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      z-index: 100;
      transition: opacity 0.55s ease, visibility 0.55s ease;
      /* subtle animated grain / texture (ultra light) */
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(200,16,46,0.03) 0%, transparent 30%),
        radial-gradient(circle at 80% 70%, rgba(0,51,160,0.04) 0%, transparent 40%),
        linear-gradient(145deg, #0a1628 0%, #111d34 100%);
    }

    #loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* ----- brand / wordmark (elevated) ----- */
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      filter: drop-shadow(0 12px 30px rgba(0,0,0,0.6));
    }

    .brand-icon {
      width: 60px;
      height: 60px;
      background: #C8102E;
      border-radius: 16px;
      border: 2px solid #0033A0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      font-weight: 800;
      font-size: 30px;
      color: #FFFFFF;
      letter-spacing: -1px;
      flex-shrink: 0;
      box-shadow: 
        0 0 0 1px rgba(0,51,160,0.5),
        0 14px 34px rgba(200,16,46,0.45),
        inset 0 -2px 0 rgba(0,0,0,0.2);
      transition: transform 0.2s ease;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .brand-name {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 10px rgba(0,51,160,0.3);
    }

    .brand-sub {
      font-family: system-ui, 'Segoe UI', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #C8102E;
      text-transform: uppercase;
      letter-spacing: 3.5px;
      margin-top: 5px;
      opacity: 0.9;
      text-shadow: 0 0 12px rgba(200,16,46,0.3);
    }

    /* ----- tri-color divider (bold) ----- */
    .tribar {
      display: flex;
      width: 220px;
      height: 4px;
      border-radius: 4px;
      overflow: hidden;
      gap: 4px;
      box-shadow: 0 0 20px rgba(200,16,46,0.2);
    }
    .tribar span {
      flex: 1;
      border-radius: 3px;
    }
    .tribar .r { background: #C8102E; }
    .tribar .w { background: #FFFFFF; opacity: 0.85; }
    .tribar .b { background: #0033A0; }

    /* ----- progress (animated with glow) ----- */
    .progress-track {
      width: 240px;
      height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #0033A0 0%, #C8102E 50%, #ff4d6d 100%);
      background-size: 200% 100%;
      border-radius: 4px;
      width: 0%;
      animation: load 2.6s cubic-bezier(0.4, 0, 0.2, 1) forwards,
                 shimmer 2.8s ease-in-out infinite alternate;
    }

    @keyframes load {
      0%   { width: 0%; }
      35%  { width: 48%; }
      65%  { width: 72%; }
      88%  { width: 90%; }
      100% { width: 100%; }
    }

    @keyframes shimmer {
      0%   { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }

    .loading-label {
      font-family: system-ui, 'Segoe UI', monospace;
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.35);
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.3s;
      margin-top: -6px;
    }

    /* ----- corner accents (stronger presence) ----- */
    .corner {
      position: fixed;
      width: 68px;
      height: 68px;
      opacity: 0.35;
      filter: drop-shadow(0 0 12px rgba(200,16,46,0.15));
    }
    .corner.tl { top: 0; left: 0;  border-top: 3px solid #C8102E; border-left: 3px solid #C8102E; }
    .corner.tr { top: 0; right: 0; border-top: 3px solid #0033A0; border-right: 3px solid #0033A0; }
    .corner.bl { bottom: 0; left: 0;  border-bottom: 3px solid #0033A0; border-left: 3px solid #0033A0; }
    .corner.br { bottom: 0; right: 0; border-bottom: 3px solid #C8102E; border-right: 3px solid #C8102E; }

    /* subtle pulse on corners */
    .corner.tl, .corner.br { animation: pulseRed 3s infinite alternate; }
    .corner.tr, .corner.bl { animation: pulseBlue 3s infinite alternate; }

    @keyframes pulseRed {
      0% { opacity: 0.25; }
      100% { opacity: 0.55; }
    }
    @keyframes pulseBlue {
      0% { opacity: 0.25; }
      100% { opacity: 0.55; }
    }

    /* ----- iframe (smooth reveal) ----- */
    #frame {
      display: block;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      transition: opacity 0.5s ease 0.15s;
      background: #0a1628;
    }

    #frame.visible {
      opacity: 1;
    }

    /* small extra: iframe inner shadow via pseudo? not needed */

    /* ----- responsive adjustments ----- */
    @media screen and (max-width: 768px) {
      #frame {
        height: calc(100% - env(safe-area-inset-bottom, 0px));
      }
      .brand-icon {
        width: 50px;
        height: 50px;
        font-size: 24px;
        border-radius: 14px;
      }
      .brand-name {
        font-size: 22px;
      }
      .brand-sub {
        font-size: 10px;
        letter-spacing: 2.5px;
      }
      .tribar {
        width: 160px;
        height: 3px;
      }
      .progress-track {
        width: 180px;
      }
      .corner {
        width: 44px;
        height: 44px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .progress-fill {
        animation-duration: 3s;
      }
      .corner {
        animation: none;
        opacity: 0.35;
      }
    }
  </style>
</head>
<body>

  <!-- Loading overlay – powerful, cinematic -->
  <div id="loader" role="status" aria-label="Loading EpitechGh">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="brand">
      <div class="brand-icon" aria-hidden="true">A</div>
      <div class="brand-text">
        <span class="brand-name">EpitechGh</span>
        <span class="brand-sub">School Management System</span>
      </div>
    </div>

    <div class="tribar">
      <span class="r"></span>
      <span class="w"></span>
      <span class="b"></span>
    </div>

    <div>
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
    </div>

    <span class="loading-label">Loading…</span>
  </div>

  <!-- Main iframe -->
  <iframe
    id="frame"
    src="https://script.google.com/macros/s/AKfycbw5rkDCImFCil3i2kYuwOiGU2WTGJQWAMnaiTE81Mj6VxeRa5opCrbIzmw3INA3SeZpQg/exec"
    title="EpitechGh – School Management"
    loading="eager"
    allowfullscreen
  ></iframe>

  <script>
    (function() {
      var loader = document.getElementById('loader');
      var frame  = document.getElementById('frame');

      function reveal() {
        loader.classList.add('hidden');
        frame.classList.add('visible');
      }

      // When iframe loads, reveal with a tiny extra delay for smoothness
      frame.addEventListener('load', function () {
        setTimeout(reveal, 320);
      });

      // fallback: reveal after 6s (if iframe takes too long)
      var fallback = setTimeout(reveal, 6000);

      // clear fallback if load fires
      frame.addEventListener('load', function () {
        clearTimeout(fallback);
      });

      // ensure that if something goes wrong, we still show content
      window.addEventListener('error', function() {
        clearTimeout(fallback);
        reveal();
      });
    })();
  </script>
</body>
</html>
